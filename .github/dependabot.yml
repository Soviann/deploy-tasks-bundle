version: 2
updates:
    - package-ecosystem: composer
      directory: /
      schedule:
          interval: weekly
      open-pull-requests-limit: 5
      labels: ["dependencies", "composer"]
      commit-message:
          prefix: "chore"
    - package-ecosystem: github-actions
      directory: /
      schedule:
          interval: weekly
      open-pull-requests-limit: 5
      labels: ["dependencies", "github-actions"]
      commit-message:
          prefix: "chore"
