name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

jobs:
  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse

  cs-fixer:
    name: CS Fixer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run CS Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

  tests:
    name: Tests (PHP ${{ matrix.php }}, Symfony ${{ matrix.symfony || 'latest' }}${{ matrix.prefer-lowest && ', prefer-lowest' || '' }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        symfony: ['6.4.*', '7.2.*']
        include:
          - php: '8.2'
            symfony: '6.4.*'
            prefer-lowest: true
            composer-flags: '--prefer-lowest --prefer-stable'
          - php: '8.4'
            symfony: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
          coverage: none

      - name: Set Symfony version constraint
        if: matrix.symfony != ''
        run: echo "SYMFONY_REQUIRE=${{ matrix.symfony }}" >> $GITHUB_ENV

      - name: Install Symfony Flex globally
        run: |
          composer global config --no-plugins allow-plugins.symfony/flex true
          composer global require --no-progress --no-scripts --no-plugins symfony/flex

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress ${{ matrix.composer-flags }}

      - name: Run tests
        run: vendor/bin/phpunit
