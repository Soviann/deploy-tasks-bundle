name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Composer validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Validate composer.json
        run: composer validate --strict

  shellcheck:
    name: Shellcheck host runner
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # shellcheck ships preinstalled on ubuntu-latest. Scoped to the runner
      # itself and any real *.sh files under src/tests — none exist today
      # (deploytasks:generate:host writes its stub at runtime, from a PHP
      # template, not a committed .sh file), so the find is a no-op guard
      # against future additions rather than dead weight.
      - name: shellcheck runner + host-task scripts
        run: |
          shellcheck bin/deploy-tasks-host.sh.dist
          find src tests -name '*.sh' -print0 | xargs -0 -r shellcheck

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.json') }}
          restore-keys: composer-

      - name: Cache PHPStan result
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: var/cache/phpstan
          key: phpstan-${{ runner.os }}-${{ hashFiles('phpstan.neon', '**/composer.json') }}
          restore-keys: phpstan-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --no-progress

  cs-fixer:
    name: CS Fixer
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/.composer/cache
          key: composer-${{ hashFiles('composer.json') }}
          restore-keys: composer-

      - name: Cache CS Fixer result
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: .php-cs-fixer.cache
          key: php-cs-fixer-${{ runner.os }}-${{ hashFiles('.php-cs-fixer.dist.php', '**/composer.json') }}
          restore-keys: php-cs-fixer-${{ runner.os }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Run CS Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff

  tests:
    name: Tests (PHP ${{ matrix.php }}, Symfony ${{ matrix.symfony }}${{ matrix.prefer-lowest && ', prefer-lowest' || '' }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']
        # Symfony 7.0–7.3 are end-of-life and receive no security patches, so the
        # advisory-aware resolver can never install them — only the maintained LTS
        # lines (6.4, 7.4) are exercised. 7.4 covers the 7.x API surface.
        symfony: ['6.4.*', '7.4.*']
        include:
          - php: '8.2'
            symfony: '6.4.*'
            prefer-lowest: true
            composer-flags: '--prefer-lowest --prefer-stable'

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/.composer/cache
          key: composer-php${{ matrix.php }}-sf${{ matrix.symfony }}-${{ hashFiles('composer.json') }}
          restore-keys: |
            composer-php${{ matrix.php }}-sf${{ matrix.symfony }}-
            composer-php${{ matrix.php }}-

      - name: Set Symfony version constraint
        if: matrix.symfony != ''
        run: echo "SYMFONY_REQUIRE=${{ matrix.symfony }}" >> $GITHUB_ENV

      - name: Install Symfony Flex globally
        run: |
          composer global config --no-plugins allow-plugins.symfony/flex true
          composer global require --no-progress --no-scripts --no-plugins symfony/flex

      # Suppress advisories that block Composer 2.9 resolution (audit.block-insecure default).
      # PKSA-365x-2zjk-pt47: symfony/http-foundation 6.4.*/7.4.* — re-evaluate once Symfony ships a patched release.
      # PKSA-b35n-565h-rs4q: symfony/http-foundation 6.4.*/7.4.* — re-evaluate once Symfony ships a patched release.
      # PKSA-rkkf-636k-qjb3: symfony/process 6.4.*/7.4.* — re-evaluate once Symfony ships a patched release.
      # PKSA-wws7-mr54-jsny: symfony/process 6.4.*/7.4.* — re-evaluate once Symfony ships a patched release.
      - name: Ignore Symfony security advisories blocking resolution
        run: composer config audit.ignore --json '["PKSA-365x-2zjk-pt47","PKSA-b35n-565h-rs4q","PKSA-rkkf-636k-qjb3","PKSA-wws7-mr54-jsny"]'

      - name: Install dependencies
        run: composer update --prefer-dist --no-progress --no-scripts ${{ matrix.composer-flags }}

      - name: Run tests
        env:
          SYMFONY_DEPRECATIONS_HELPER: ${{ matrix.prefer-lowest && 'disabled=1' || 'max[direct]=0' }}
        run: vendor/bin/phpunit

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Hoisted to job level: the secrets context is not available inside step-level
    # `if:` expressions — referencing it there fails the whole workflow at startup.
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/.composer/cache
          key: composer-coverage-${{ hashFiles('composer.json') }}
          restore-keys: composer-coverage-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Run tests with coverage
        run: vendor/bin/phpunit --coverage-clover=build/coverage/clover.xml --coverage-text=build/coverage/coverage.txt

      - name: Enforce coverage threshold
        run: |
          php -r '
          $xml = simplexml_load_file("build/coverage/clover.xml");
          $metrics = $xml->xpath("/coverage/project/metrics")[0];
          $covered = (int) $metrics["coveredstatements"];
          $total = (int) $metrics["statements"];
          $pct = $total > 0 ? ($covered / $total) * 100 : 0;
          printf("Line coverage: %.2f%% (%d / %d)\n", $pct, $covered, $total);
          exit($pct >= 95 ? 0 : 1);
          '

      - name: Upload coverage to Codecov
        if: env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ./build/coverage/clover.xml
          fail_ci_if_error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage-clover
          path: build/coverage/
          retention-days: 14

  security:
    name: Composer audit
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      # Same suppressions as the tests job — drop each entry once the matching Symfony release ships:
      # PKSA-365x-2zjk-pt47: symfony/http-foundation 6.4.*/7.4.*.
      # PKSA-b35n-565h-rs4q: symfony/http-foundation 6.4.*/7.4.*.
      # PKSA-rkkf-636k-qjb3: symfony/process 6.4.*/7.4.*.
      # PKSA-wws7-mr54-jsny: symfony/process 6.4.*/7.4.*.
      - name: Ignore Symfony security advisories blocking resolution
        run: composer config audit.ignore --json '["PKSA-365x-2zjk-pt47","PKSA-b35n-565h-rs4q","PKSA-rkkf-636k-qjb3","PKSA-wws7-mr54-jsny"]'

      - name: Run composer audit
        run: composer audit --locked

  mutation:
    name: Mutation testing
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/.composer/cache
          key: composer-mutation-${{ hashFiles('composer.json') }}
          restore-keys: composer-mutation-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-scripts

      - name: Run Infection
        # Explicit --threads=4 (ubuntu-latest has 4 vCPUs): --threads=max fails to
        # detect the core count on the runner and falls back to a single thread,
        # which pushed the run to ~18 min — close to the job timeout.
        run: vendor/bin/infection --threads=4 --logger-github
